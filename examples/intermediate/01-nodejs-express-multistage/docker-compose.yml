version: '3.8'

services:
  # Production service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: express-multistage-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - app-network

  # Development service (separate compose file recommended for dev)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: express-multistage-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      # Mount source code for hot-reload in development
      - ./server.js:/app/server.js:ro
      - ./package.json:/app/package.json:ro
    networks:
      - app-network
    profiles:
      - dev

networks:
  app-network:
    driver: bridge
